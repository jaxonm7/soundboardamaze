    .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px; /* More space for the text beneath */
    padding: 20px;
}

/* This creates the circular button container */
.sound-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    font-weight: bold;
}

button { 
    width: 80px; /* Makes it a circle */
    height: 80px; 
    border-radius: 50%; /* This makes it round */
    border: 4px solid #333; /* Dark border like the image */
    background: #444; 
    cursor: pointer;
    margin-bottom: 10px; /* Space between circle and text */
    box-shadow: 0 4px #222;
    transition: 0.1s;
}

button:active {
    transform: translateY(3px);
    box-shadow: 0 1px #222;
}
