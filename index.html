<!DOCTYPE html>
<html>
<head>
    <title>Jaxon Sounds</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
        }

        /* This ensures your title and buttons are ALWAYS on top */
        .container {
            position: relative;
            z-index: 10;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .sound-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: none;
            /* MAKE SURE THIS FILENAME IS EXACTLY WHAT YOU HAVE IN GITHUB */
            background-image: url('Screenshot 2026-03-11 222647.png');
            background-size: cover;
            background-position: center;
            cursor: pointer;
            box-shadow: 0 4px #000;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px #000;
        }

        span {
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jaxon sounds</h1>
        
        <div class="grid">
            <div class="sound-item">
                <button onclick="new Audio('Screen Recording 2026-03-10 221505.mp3').play()"></button>
                <span>Android</span>
            </div>
            <div class="sound-item">
                <button onclick="new Audio('Screen Recording 2026-03-10 221533.mp3').play()"></button>
                <span>Jaxon Rizz</span>
            </div>
            <div class="sound-item">
                <button onclick="new Audio('Screen Recording 2026-03-10 221353.mp3').play()"></button>
                <span>FAHH jaxon</span>
            </div>
        </div>
    </div>

</body>
</html>
