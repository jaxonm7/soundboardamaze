<!DOCTYPE html>
<html>
<head>
    <title>Jaxon Sounds</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .content { position: relative; z-index: 10; padding: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .sound-item { display: flex; flex-direction: column; align-items: center; }
        button { 
            width: 80px; height: 80px; 
            border-radius: 50%; border: none;
            background-image: url('Screenshot 2026-03-11 222647.png');
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.9); }
        span { margin-top: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="content">
        <h1>Jaxon sounds</h1>
        <div class="grid">
            <div class="sound-item"><button onclick="new Audio('Screen Recording 2026-03-10 221505.mp3').play()"></button><span>Android</span></div>
            <div class="sound-item"><button onclick="new Audio('Screen Recording 2026-03-10 221533.mp3').play()"></button><span>Jaxon Rizz</span></div>
            <div class="sound-item"><button onclick="new Audio('Screen Recording 2026-03-10 221353.mp3').play()"></button><span>FAHH jaxon</span></div>
            </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        for (let i = 0; i < 80; i++) { dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 }); }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'white';
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1;
                if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1.5, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</head>
